<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>base128-ascii</title>
    <link rel="preload" as="font" href="./SegoeUISymbol-ControlCharFont.woff2">
    <link rel="modulepreload" href="./base128.js">
    <style>
        @font-face {
            font-family: 'ControlCharFont';
            src: url("./SegoeUISymbol-ControlCharFont.woff2");
            unicode-range: U+0-1F, U+7F;
        }

        * {
            color-scheme: light dark;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            display: flex;
            justify-content: center;
        }

        #main {
            width: 100%;
            max-width: 600px;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
            font-family: 'ControlCharFont', 'JetBrains Mono', Consolas, 'Courier New', monospace, system-ui;
            font-size: 16px;
            white-space: pre-wrap;
            tab-size: 4;
            min-height: 200px;
        }

        button {
            line-height: 20px;
            font-size: 14px;
        }

        body:has(#select-mode-encode:checked) #main-decode,
        body:has(#select-mode-decode:checked) #main-encode,
        body:has(#encode-input-type-text:checked) #encode-input-file,
        body:has(#encode-input-type-file:checked) #encode-input,
        body:has(#decode-output-type-text:checked) #decode-output-div-file,
        body:has(#decode-output-type-file:checked) #decode-output-div-text {
            display: none;
        }
    </style>
</head>

<body>
    <div id="main">
        <h1>base128-ascii</h1>
        <p>Smaller than base64, only use ASCII, can run in web browser.</p>
        <p><a target="_blank" href="https://github.com/bddjr/base128">Github</a> &nbsp;|&nbsp; <a target="_blank"
                href="https://www.npmjs.com/package/base128-ascii">npm</a></p>
        <hr>
        <p>mode:</p>
        <form id="select-mode">
            <div>
                <input checked type="radio" name="input" id="select-mode-encode" value="encode">
                <label for="select-mode-encode">encode</label>
            </div>
            <div>
                <input type="radio" name="input" id="select-mode-decode" value="decode">
                <label for="select-mode-decode">decode</label>
            </div>
        </form>
        <div id="main-encode">
            <p>input type:</p>
            <form id="encode-input-type">
                <div>
                    <input checked type="radio" name="input" id="encode-input-type-text" value="text">
                    <label for="encode-input-type-text">text (UTF-8)</label>
                </div>
                <div>
                    <input type="radio" name="input" id="encode-input-type-file" value="file">
                    <label for="encode-input-type-file">file</label>
                </div>
            </form>
            <p>input:</p>
            <textarea id="encode-input">Hello world!</textarea>
            <input type="file" id="encode-input-file">
            <p>toJSTemplateLiterals:
                &nbsp; <button type="button" copy="encode-output" id="encode-output-copy" disabled>Copy</button>
                &nbsp; <button type="button" id="encode-output-download" disabled>Download</button>
            </p>
            <textarea id="encode-output" readonly disabled></textarea>
        </div>
        <div id="main-decode">
            <p>input JSTemplateLiterals:</p>
            <textarea id="decode-input">`$-Fc<@w7\\MF!`</textarea>
            <p>output type:</p>
            <form id="decode-output-type">
                <div>
                    <input checked type="radio" name="input" id="decode-output-type-text" value="text">
                    <label for="decode-output-type-text">text (UTF-8)</label>
                </div>
                <div>
                    <input type="radio" name="input" id="decode-output-type-file" value="file">
                    <label for="decode-output-type-file">file</label>
                </div>
            </form>
            <div id="decode-output-div-text">
                <p>output:
                    &nbsp; <button type="button" copy="decode-output" id="decode-output-copy" disabled>Copy</button>
                </p>
                <textarea id="decode-output" readonly disabled></textarea>
            </div>
            <div id="decode-output-div-file">
                <p>output:</p>
                <button type="button" id="decode-output-file-download">Download</button>
            </div>
        </div>
    </div>
    <iframe id="sandbox" style="display: none;"></iframe>
    <script type="module">
        import base128 from './base128.js';
        self.base128 = base128
        const textEncoder = new TextEncoder
        const textDecoder = new TextDecoder
        const outputWaitAMinute = 'Wait a minute...'
        const selectModeElem = document.getElementById("select-mode")

        const sandboxEval = (iframe => {
            const f = iframe.contentWindow.eval
            iframe.remove()
            return f
        })(document.getElementById("sandbox"))

        const readFileToBytes = (file) => {
            const fr = new FileReader
            fr.readAsArrayBuffer(new Blob([file]))
            return new Promise((resolve, reject) => {
                fr.onload = () => resolve(new Uint8Array(fr.result))
                fr.onerror = () => reject(fr.error)
            })
        }

        const downloadFromBlob = (blob) => {
            const bloburl = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = bloburl
            a.download = ''
            a.click()
            URL.revokeObjectURL(bloburl)
        }

        const textToClipboardText = (text) => text.replaceAll('\0', '\ufffd')

        {
            const inputTypeElem = document.getElementById("encode-input-type")
            const inputElem = document.getElementById("encode-input")
            const inputFileElem = document.getElementById("encode-input-file")
            const outputElem = document.getElementById("encode-output")
            const outputCopyButton = document.getElementById("encode-output-copy")
            const outputDownloadButton = document.getElementById("encode-output-download")
            let outputValue = ''
            const oninput = async () => {
                try {
                    outputCopyButton.disabled = true
                    outputElem.disabled = true
                    outputDownloadButton.disabled = true
                    outputValue = ''
                    outputElem.value = outputWaitAMinute
                    const inputType = inputTypeElem.input.value;
                    let inputValue;
                    if (inputType === 'text') {
                        inputValue = textEncoder.encode(inputElem.value)
                    } else if (inputType === 'file') {
                        const files = inputFileElem.files
                        if (files.length) {
                            inputValue = await readFileToBytes(files[0])
                        } else inputValue = '';
                    } else throw Error(`unknown input type "${inputType}"`);
                    outputElem.value = outputValue = base128.encode(inputValue).toJSTemplateLiterals()
                    outputCopyButton.disabled = false
                    outputElem.disabled = false
                    outputDownloadButton.disabled = false
                } catch (e) {
                    console.error(e)
                    outputElem.value = e
                }
            }
            inputTypeElem.oninput = oninput;
            inputElem.oninput = oninput;
            inputFileElem.oninput = oninput;
            oninput();
            outputDownloadButton.onclick = () => {
                downloadFromBlob(new Blob([outputValue], { type: 'text/javascript' }))
            }
            outputDownloadButton.disabled = false
        }
        {
            const inputElem = document.getElementById("decode-input")
            const outputTypeElem = document.getElementById("decode-output-type")
            const outputElem = document.getElementById("decode-output")
            const outputCopyButton = document.getElementById("decode-output-copy")
            const outputFileDownloadButton = document.getElementById("decode-output-file-download")
            const oninput = () => {
                try {
                    const outputType = outputTypeElem.input.value;
                    if (outputType === 'text') {
                        outputCopyButton.disabled = true
                        outputElem.disabled = true
                        outputElem.value = outputWaitAMinute
                        const input = sandboxEval(inputElem.value)
                        const out = base128.decode(input)
                        outputElem.value = textDecoder.decode(out)
                        outputCopyButton.disabled = false
                        outputElem.disabled = false
                    } else if (outputType === 'file') {
                        // ignore
                    } else throw Error(`unknown output type "${outputType}"`)
                } catch (e) {
                    console.error(e)
                    outputElem.value = e
                }
            }
            inputElem.oninput = oninput;
            outputTypeElem.oninput = oninput;
            oninput();
            outputFileDownloadButton.onclick = () => {
                try {
                    outputFileDownloadButton.disabled = true
                    const input = sandboxEval(inputElem.value)
                    const out = base128.decode(input)
                    downloadFromBlob(new Blob([out], { type: 'application/octet-stream' }))
                } catch (e) {
                    console.error(e)
                    alert(e)
                }
                outputFileDownloadButton.disabled = false
            };
            outputFileDownloadButton.disabled = false
        }
        {
            const copyButtonDefaultInnerHTML = 'Copy'
            for (const e of document.querySelectorAll('button[copy]')) {
                e.innerHTML = copyButtonDefaultInnerHTML
                let timeoutId = null
                e.onclick = async () => {
                    try {
                        if (timeoutId !== null) clearTimeout(timeoutId);
                        const textElem = document.getElementById(e.getAttribute('copy'))
                        await navigator.clipboard.writeText(textToClipboardText(textElem.value))
                        e.innerHTML = '✅ Copied!'
                        timeoutId = setTimeout(() => {
                            timeoutId = null
                            e.innerHTML = copyButtonDefaultInnerHTML
                        }, 2000)
                    } catch (e) {
                        console.error(e)
                        alert(e)
                        e.innerHTML = copyButtonDefaultInnerHTML
                    }
                }
            }
        }
        for (const textarea of document.getElementsByTagName('textarea')) {
            textarea.addEventListener('copy', (e) => {
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                if (start === end) return;
                const selectedText = textarea.value.slice(start, end);
                e.preventDefault();
                e.clipboardData.setData('text/plain', textToClipboardText(selectedText));
            });
        }
    </script>
</body>

</html>
