<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>base128-ascii</title>
    <link rel="icon" href="data:,">
    <link rel="preload" as="font" crossorigin href="./SegoeUISymbol-ControlCharFont.woff2">
    <link rel="modulepreload" href="./base128.js">
    <style>
        @font-face {
            font-family: 'ControlCharFont';
            src: url("./SegoeUISymbol-ControlCharFont.woff2");
            unicode-range: U+0-1F, U+7F;
        }

        * {
            color-scheme: light dark;
            box-sizing: border-box;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            display: flex;
            justify-content: center;
            margin: 24px 16px;
        }

        #main {
            width: 100%;
            max-width: 600px;
        }

        #h1 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
            font-family: 'ControlCharFont', 'JetBrains Mono', Consolas, 'Courier New', monospace, system-ui;
            font-size: 16px;
            white-space: pre-wrap;
            tab-size: 4;
            min-height: 200px;
            border-radius: 4px;
            padding: 6px;
        }

        button {
            cursor: pointer;
            line-height: 20px;
            font-size: 14px;
        }

        button:disabled {
            cursor: default;
        }

        input[type=file] {
            border: 1px solid rgb(118, 118, 118);
            border-radius: 4px;
            width: 100%;
            padding: 16px;
            cursor: pointer;
        }

        input[type=file]::file-selector-button {
            margin-right: 8px;
            cursor: pointer;
        }

        label.checkbox {
            cursor: pointer;
            line-height: 24px;
            display: inline-flex;
            gap: 6px;
            padding: 2px 6px;
            align-items: center;
        }

        label.checkbox input {
            cursor: pointer;
            margin: 0;
        }

        .form-title {
            margin-bottom: 8px;
        }

        body:has(#select-mode-encode:checked) #main-decode,
        body:has(#select-mode-decode:checked) #main-encode,
        body:has(#encode-input-type-text:checked) #encode-input-file,
        body:has(#encode-input-type-file:checked) #encode-input,
        body:not(:has(#encode-output-display:checked)) #encode-output,
        body:has(#decode-input-type-text:checked) #decode-input-file,
        body:has(#decode-input-type-file:checked) #decode-input,
        body:has(#decode-output-type-text:checked) #decode-output-div-file,
        body:has(#decode-output-type-file:checked) #decode-output-div-text {
            display: none;
        }
    </style>
    <noscript>
        <style>
            [hide-if-noscript] {
                display: none;
            }
        </style>
    </noscript>
</head>

<body>
    <div id="main">
        <h1 id="h1">base128-ascii</h1>
        <p>Smaller than base64, only use ASCII, can run in web browser.</p>
        <p>Build for <a target="_blank"
                href="https://bddjr.github.io/vite-plugin-singlefile-compression/#/">vite-plugin-singlefile-compression</a>
        </p>
        <p><a target="_blank" href="https://github.com/bddjr/base128">Github</a> &nbsp;|&nbsp; <a target="_blank"
                href="https://www.npmjs.com/package/base128-ascii">npm</a></p>
        <hr>
        <noscript style="display: block; color: #d32f2f; background: #ffebee; padding: 10px;">
            Error: Please allow JavaScript then reload page.
        </noscript>
        <div hide-if-noscript>
            <p class="form-title">mode:</p>
            <form class="checkbox" id="select-mode">
                <label class="checkbox" for="select-mode-encode">
                    <input checked type="radio" name="input" id="select-mode-encode" value="encode">
                    encode
                </label>
                <label class="checkbox" for="select-mode-decode">
                    <input type="radio" name="input" id="select-mode-decode" value="decode">
                    decode
                </label>
            </form>
            <div id="main-encode">
                <p class="form-title">input type:</p>
                <form class="checkbox" id="encode-input-type">
                    <label class="checkbox" for="encode-input-type-text">
                        <input checked type="radio" name="input" id="encode-input-type-text" value="text">
                        text (UTF-8)
                    </label>
                    <label class="checkbox" for="encode-input-type-file">
                        <input type="radio" name="input" id="encode-input-type-file" value="file">
                        file
                    </label>
                </form>
                <p class="form-title">input:</p>
                <textarea id="encode-input">Hello world!</textarea>
                <input type="file" id="encode-input-file">
                <p class="form-title">toJSTemplateLiterals:
                    &nbsp; <button type="button" id="encode-output-download" disabled>Download</button>
                    &nbsp; <label class="checkbox" for="encode-output-display">
                        <input checked type="checkbox" id="encode-output-display">
                        display
                    </label>
                </p>
                <textarea id="encode-output" readonly disabled></textarea>
            </div>
            <div id="main-decode">
                <p class="form-title">input type:</p>
                <form class="checkbox" id="decode-input-type">
                    <label class="checkbox" for="decode-input-type-text">
                        <input type="radio" name="input" id="decode-input-type-text" value="text">
                        text (UTF-8)</label>
                    <label class="checkbox" for="decode-input-type-file">
                        <input checked type="radio" name="input" id="decode-input-type-file" value="file">
                        file
                    </label>
                </form>
                <p class="form-title">input JSTemplateLiterals:</p>
                <textarea id="decode-input">`$-Fc<@w7\\MF!`</textarea>
                <input type="file" id="decode-input-file" accept=".base128jstl">
                <p class="form-title">output type:</p>
                <form class="checkbox" id="decode-output-type">
                    <label class="checkbox" for="decode-output-type-text">
                        <input type="radio" name="input" id="decode-output-type-text" value="text">
                        text (UTF-8)
                    </label>
                    <label class="checkbox" for="decode-output-type-file">
                        <input checked type="radio" name="input" id="decode-output-type-file" value="file">
                        file
                    </label>
                </form>
                <p class="form-title">output:</p>
                <div id="decode-output-div-text">
                    <textarea id="decode-output" readonly disabled></textarea>
                </div>
                <div id="decode-output-div-file">
                    <button type="button" id="decode-output-file-download">Download</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import base128 from './base128.js';
        self.base128 = base128

        const textEncoder = new TextEncoder
        const textDecoder = new TextDecoder
        const outputWaitAMinute = 'Wait a minute...'
        const selectModeElem = document.getElementById("select-mode")

        // 警告：值不能含有大写字母！
        const encodeOutputExt = ".base128jstl";

        /**
         * @param {string} inputFileName
         */
        const generateEncodeOutputFileName = (inputFileName) => {
            if (!inputFileName) inputFileName = generateFileTimeName() + '.txt';
            return inputFileName + encodeOutputExt
        }

        /**
         * 在沙盒里执行eval。
         * 内部无法获取父window，无法发起网络请求。
         * @type {typeof eval}
         */
        const sandboxEval = (() => {
            const iframe = document.createElement('iframe')
            iframe.style.display = 'none'
            document.body.appendChild(iframe)
            const sandboxEval = iframe.contentWindow.eval
            iframe.remove()
            return sandboxEval
        })()

        self.sandboxEval = sandboxEval

        const readFileToBytes = (file) => {
            const fr = new FileReader
            fr.readAsArrayBuffer(new Blob([file]))
            return new Promise((resolve, reject) => {
                fr.onload = () => resolve(new Uint8Array(fr.result))
                fr.onerror = () => reject(fr.error)
            })
        }

        const readFileToText = (file) => {
            const fr = new FileReader
            fr.readAsText(new Blob([file]))
            return new Promise((resolve, reject) => {
                fr.onload = () => resolve(fr.result)
                fr.onerror = () => reject(fr.error)
            })
        }

        /**
         * 从文件名获取扩展名（带点），若无扩展名则返回空字符串
         * @param {string} name
         * @returns {string}
         */
        const getExtFromFileName = (name) => {
            if (!name) return ''
            const i = name.lastIndexOf('.')
            // 最后一个点不能在开头或结尾，也不能没有点
            return i > 0 && i < (name.length - 1)
                ? name.slice(i)
                : ''
        }

        /**
         * @param {Blob} blob
         * @param {string} [name]
         */
        const saveBlobToFile = async (blob, name = '') => {
            if (typeof self.showSaveFilePicker == 'function') {
                // MDN Reference:
                // https://developer.mozilla.org/docs/Web/API/Window/showOpenFilePicker
                try {
                    const options = {
                        suggestedName: name,
                        startIn: "downloads",
                    }
                    const ext = getExtFromFileName(name)
                    if (ext) {
                        const extLowerCase = ext.toLowerCase()
                        let description, accept;
                        switch (extLowerCase) {
                            case '.txt':
                                accept = { 'text/plain': ['.txt', '.text'] }
                                break
                            case '.jpg':
                            case '.pjp':
                            case '.jfif':
                            case '.jpe':
                            case '.pjpeg':
                            case '.jpeg':
                                accept = {
                                    'image/jpeg': [
                                        '.jpg',
                                        '.pjp',
                                        '.jfif',
                                        '.jpe',
                                        '.pjpeg',
                                        '.jpeg',
                                    ]
                                }
                                break
                            case encodeOutputExt:
                                description = 'Base128 JSTemplateLiterals'
                                accept = { [`application/${encodeOutputExt}`]: [encodeOutputExt] }
                                break
                            default:
                                accept = { [`application/${ext.replace('.', '')}`]: [ext] }
                        }
                        options.types = [{ description, accept }]
                    }
                    /** @type {FileSystemFileHandle} */
                    const handle = await self.showSaveFilePicker(options);
                    // 已知最终文件名。如果写入失败，则自动回退到a标签下载。
                    name = handle.name
                    const writable = await handle.createWritable();
                    try {
                        // 写入我们的文件
                        await writable.write(blob);
                    } finally {
                        // 关闭文件并将内容写入磁盘
                        await writable.close();
                    }
                    return
                } catch (e) {
                    if (e.name === 'AbortError') {
                        // 用户取消保存
                        return
                    }
                    console.error(e);
                    // 写入失败，自动回退到a标签下载。
                }
            }
            const bloburl = URL.createObjectURL(blob)
            try {
                const a = document.createElement('a')
                a.href = bloburl
                a.download = name
                a.click()
            } finally {
                URL.revokeObjectURL(bloburl)
            }
        }

        /**
         * @param {string} text
         * @returns {string}
         */
        const textToClipboardText = (text) => text.replaceAll('\0', '\ufffd')

        const generateFileTimeName = () => {
            const d = new Date
            return d.getFullYear().toString().concat(
                (1 + d.getMonth()).toString().padStart(2, '0'),
                d.getDate().toString().padStart(2, '0'),
                '-',
                d.getHours().toString().padStart(2, '0'),
                d.getMinutes().toString().padStart(2, '0'),
                d.getSeconds().toString().padStart(2, '0'),
                '-',
                d.getMilliseconds().toString().padStart(3, '0'),
            )
        }

        /**
         * 通过读取文件头（魔数）检测文件类型，返回推荐扩展名（带点）
         */
        const detectFileExtension = (() => {
            // 定义魔数映射表，magic 直接使用 Uint8Array.of() 创建
            // 注意：按魔数长度从长到短排列，避免短魔数误匹配长魔数
            const signatures = [
                // ---------- 图片 ----------
                { ext: 'jpg', magic: Uint8Array.of(0xFF, 0xD8, 0xFF) },                           // JPEG
                { ext: 'png', magic: Uint8Array.of(0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A) }, // PNG
                { ext: 'gif', magic: Uint8Array.of(0x47, 0x49, 0x46, 0x38, 0x37, 0x61) },        // GIF87a
                { ext: 'gif', magic: Uint8Array.of(0x47, 0x49, 0x46, 0x38, 0x39, 0x61) },        // GIF89a
                { ext: 'bmp', magic: Uint8Array.of(0x42, 0x4D) },                                // BMP
                { ext: 'tif', magic: Uint8Array.of(0x49, 0x49, 0x2A, 0x00) },                    // TIFF (小端)
                { ext: 'tif', magic: Uint8Array.of(0x4D, 0x4D, 0x00, 0x2A) },                    // TIFF (大端)
                { ext: 'webp', magic: Uint8Array.of(0x52, 0x49, 0x46, 0x46) },                   // WEBP (需额外检查)
                { ext: 'avif', magic: Uint8Array.of(0x00, 0x00, 0x00, 0x18, 0x66, 0x74, 0x79, 0x70, 0x61, 0x76, 0x69, 0x66) }, // AVIF (ftypavif)
                { ext: 'avif', magic: Uint8Array.of(0x00, 0x00, 0x00, 0x18, 0x66, 0x74, 0x79, 0x70, 0x61, 0x76, 0x69, 0x73) }, // AVIF (ftypavis)
                // ---------- 文档/压缩 ----------
                { ext: 'pdf', magic: Uint8Array.of(0x25, 0x50, 0x44, 0x46) },                    // PDF
                { ext: 'zip', magic: Uint8Array.of(0x50, 0x4B, 0x03, 0x04) },                    // ZIP (含 docx/xlsx/pptx)
                { ext: 'zip', magic: Uint8Array.of(0x50, 0x4B, 0x05, 0x06) },                    // 空ZIP
                { ext: 'zip', magic: Uint8Array.of(0x50, 0x4B, 0x07, 0x08) },                    // ZIP (spanned)
                { ext: 'rar', magic: Uint8Array.of(0x52, 0x61, 0x72, 0x21) },                    // RAR
                { ext: '7z', magic: Uint8Array.of(0x37, 0x7A, 0xBC, 0xAF, 0x27, 0x1C) },         // 7z
                { ext: 'gz', magic: Uint8Array.of(0x1F, 0x8B) },                                 // GZIP
                // ---------- 音频 ----------
                { ext: 'mp3', magic: Uint8Array.of(0x49, 0x44, 0x33) },                          // MP3 (带ID3v2)
                { ext: 'mp3', magic: Uint8Array.of(0xFF, 0xFB) },                                // MP3 (无ID3)
                { ext: 'mp3', magic: Uint8Array.of(0xFF, 0xF3) },                                // MP3 (无ID3)
                { ext: 'mid', magic: Uint8Array.of(0x4D, 0x54, 0x68, 0x64) },                    // MIDI
                { ext: 'wav', magic: Uint8Array.of(0x52, 0x49, 0x46, 0x46) },                    // WAV (需额外检查)
                { ext: 'flac', magic: Uint8Array.of(0x66, 0x4C, 0x61, 0x43) },                   // FLAC
                // ---------- 视频 ----------
                { ext: 'mpg', magic: Uint8Array.of(0x00, 0x00, 0x01, 0xBA) },                    // MPEG
                { ext: 'mpg', magic: Uint8Array.of(0x00, 0x00, 0x01, 0xB3) },                    // MPEG
                { ext: 'mkv', magic: Uint8Array.of(0x1A, 0x45, 0xDF, 0xA3) },                    // Matroska
                { ext: 'mp4', magic: Uint8Array.of(0x00, 0x00, 0x00, 0x18, 0x66, 0x74, 0x79, 0x70) }, // MP4
                { ext: 'mp4', magic: Uint8Array.of(0x00, 0x00, 0x00, 0x1C, 0x66, 0x74, 0x79, 0x70) }, // MP4
                { ext: 'mp4', magic: Uint8Array.of(0x66, 0x74, 0x79, 0x70) },                    // MP4 (仅 "ftyp")
                // ---------- 可执行文件 ----------
                { ext: 'elf', magic: Uint8Array.of(0x7F, 0x45, 0x4C, 0x46) },                    // ELF
                { ext: 'exe', magic: Uint8Array.of(0x4D, 0x5A) },                                // EXE
                // ---------- 纯文本（带BOM） ----------
                { ext: 'txt', magic: Uint8Array.of(0xEF, 0xBB, 0xBF) },                          // UTF-8 BOM
                { ext: 'txt', magic: Uint8Array.of(0xFE, 0xFF) },                                // UTF-16 BE
                { ext: 'txt', magic: Uint8Array.of(0xFF, 0xFE) },                                // UTF-16 LE
                // ---------- 其他 ----------
                { ext: 'sqlite', magic: Uint8Array.of(0x53, 0x51, 0x4C, 0x69, 0x74, 0x65, 0x20, 0x66, 0x6F, 0x72, 0x6D, 0x61, 0x74, 0x33, 0x00) }, // SQLite
            ].sort((a, b) => b.magic.length - a.magic.length);

            /**
             * @param {Uint8Array} bytes - 文件内容的字节数据
             * @returns {string} - 如 '.png'，无法识别则返回 ''
             */
            return (bytes) => {
                if (bytes.length < 1) return '';

                for (const sig of signatures) {
                    const magic = sig.magic;
                    // 如果数据长度不够，跳过
                    if (bytes.length < magic.length) continue;

                    // 逐字节比较
                    let match = true;
                    for (let i = 0; i < magic.length; i++) {
                        if (bytes[i] !== magic[i]) {
                            match = false;
                            break;
                        }
                    }
                    if (!match) continue;

                    // 二次验证：对于 RIFF 容器格式（WEBP、WAV），检查子类型标识
                    if (sig.ext === 'webp' && bytes.length >= 12) {
                        // WEBP 的 RIFF 后4字节应为 'WEBP' (0x57 0x45 0x42 0x50)
                        if (!(bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50)) {
                            continue;
                        }
                    }
                    if (sig.ext === 'wav' && bytes.length >= 12) {
                        // WAV 的 RIFF 后4字节应为 'WAVE' (0x57 0x41 0x56 0x45)
                        if (!(bytes[8] === 0x57 && bytes[9] === 0x41 && bytes[10] === 0x56 && bytes[11] === 0x45)) {
                            continue;
                        }
                    }

                    return '.' + sig.ext; // 返回带点的扩展名
                }

                // 尝试解码开头的部分字节，成功则是txt文件
                const MAX_SAMPLE_SIZE = 8192;
                let sample = bytes;
                if (sample.length > MAX_SAMPLE_SIZE) {
                    let end = MAX_SAMPLE_SIZE;
                    let steps = 0;
                    const MAX_STEPS = 4;
                    while (end > 0 && (sample[end - 1] >> 6) === 0b10 && steps < MAX_STEPS) {
                        end--;
                        steps++;
                    }
                    sample = sample.subarray(0, end);
                }
                if (sample.length > 0) try {
                    new TextDecoder('utf-8', { fatal: true }).decode(sample);
                    return '.txt';
                } catch { }

                // 未知
                return '';
            }
        })()

        // encode
        {
            const inputTypeElem = document.getElementById("encode-input-type")
            const inputElem = document.getElementById("encode-input")
            /** @type {HTMLInputElement} */
            const inputFileElem = document.getElementById("encode-input-file")
            const outputElem = document.getElementById("encode-output")
            const outputDownloadButton = document.getElementById("encode-output-download")
            const outputDisplayButton = document.getElementById("encode-output-display")
            let inputFileName = '';
            let outputValue = ''
            const getInputValue = async () => {
                inputFileName = ''
                const inputType = inputTypeElem.input.value;
                if (inputType === 'text') {
                    return textEncoder.encode(inputElem.value)
                }
                if (inputType === 'file') {
                    const files = inputFileElem.files
                    if (files.length == 0) return '';
                    const f = files[0]
                    inputFileName = f.name
                    return readFileToBytes(f)
                }
                throw Error(`unknown input type "${inputType}"`);
            }
            const oninput = async () => {
                try {
                    outputElem.disabled = true
                    outputDownloadButton.disabled = true
                    outputValue = ''
                    outputElem.value = outputWaitAMinute
                    const inputValue = await getInputValue()
                    outputValue = base128.encode(inputValue).toJSTemplateLiterals()
                    // 字符数量达到 500K 自动隐藏，以此优化性能
                    if (outputValue.length >= 500000) outputDisplayButton.checked = false;
                    outputElem.value = outputValue
                    outputElem.disabled = false
                    outputDownloadButton.disabled = false
                } catch (e) {
                    console.error(e)
                    outputElem.value = e
                }
            }
            inputTypeElem.oninput = oninput;
            inputElem.oninput = oninput;
            inputFileElem.onchange = oninput;
            oninput();
            outputDownloadButton.onclick = async () => {
                outputDownloadButton.disabled = true
                try {
                    await saveBlobToFile(
                        new Blob([outputValue], { type: 'text/javascript' }),
                        generateEncodeOutputFileName(inputFileName)
                    )
                } catch (e) {
                    console.error(e)
                    alert(e)
                }
                outputDownloadButton.disabled = false
            }
            outputDownloadButton.disabled = false
        }

        // decode
        {
            const inputTypeElem = document.getElementById("decode-input-type")
            const inputElem = document.getElementById("decode-input")
            /** @type {HTMLInputElement} */
            const inputFileElem = document.getElementById("decode-input-file")
            if (inputFileElem.getAttribute("accept") !== encodeOutputExt) {
                inputFileElem.setAttribute("accept", encodeOutputExt)
                console.warn(`#decode-input-file元素的accept属性和JS常量encodeOutputExt不一致，已自动纠正。`)
            }
            const outputTypeElem = document.getElementById("decode-output-type")
            const outputElem = document.getElementById("decode-output")
            const outputFileDownloadButton = document.getElementById("decode-output-file-download")
            let inputFileName = '';
            const getInputValue = async () => {
                inputFileName = '';
                const inputType = inputTypeElem.input.value;
                if (inputType === 'text') {
                    return inputElem.value
                }
                if (inputType === 'file') {
                    const files = inputFileElem.files
                    if (files.length == 0) return '';
                    const f = files[0]
                    inputFileName = f.name
                    return readFileToText(f)
                }
                throw Error(`unknown input type "${inputType}"`);
            }
            const decode = async () => {
                const inputValue = await getInputValue();
                const input = sandboxEval(inputValue)
                return base128.decode(input)
            }
            const oninput = async () => {
                try {
                    const outputType = outputTypeElem.input.value;
                    if (outputType === 'text') {
                        outputElem.disabled = true
                        outputElem.value = outputWaitAMinute
                        const outBytes = await decode()
                        outputElem.value = textDecoder.decode(outBytes)
                        outputElem.disabled = false
                        return
                    }
                    if (outputType === 'file') {
                        outputElem.value = ''
                        // ignore
                        return
                    }
                    throw Error(`unknown output type "${outputType}"`)
                } catch (e) {
                    console.error(e)
                    outputElem.value = e
                }
            }
            inputTypeElem.oninput = oninput;
            inputElem.oninput = oninput;
            inputFileElem.onchange = oninput;
            outputTypeElem.oninput = oninput;
            oninput();
            outputFileDownloadButton.onclick = async () => {
                try {
                    outputFileDownloadButton.disabled = true
                    const outBytes = await decode()
                    let name = inputFileName
                    if (name) {
                        // 有文件名，说明input是文件
                        const ext = getExtFromFileName(name)
                        if (ext.toLowerCase() === encodeOutputExt) {
                            // 当前扩展名符合要求，去掉后缀即可
                            name = name.slice(0, -(ext.length))
                        } else {
                            // 根据内容猜扩展名
                            const newExt = detectFileExtension(outBytes)
                            if (newExt) {
                                // 猜到扩展名了，把原扩展名替换成新扩展名
                                if (ext) name = name.slice(0, -(ext.length));
                                name += newExt
                            }
                        }
                    } else {
                        // 无文件名，说明input是textarea的内容，但不确定解码后的文件类型。
                        // 现在生成一个文件名
                        name = generateFileTimeName() + detectFileExtension(outBytes)
                    }
                    await saveBlobToFile(
                        new Blob([outBytes], { type: 'application/octet-stream' }),
                        name
                    )
                } catch (e) {
                    console.error(e)
                    alert(e)
                }
                outputFileDownloadButton.disabled = false
            };
            outputFileDownloadButton.disabled = false
        }

        // hijack copy
        for (const textarea of document.getElementsByTagName('textarea')) {
            textarea.addEventListener('copy', (e) => {
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                if (start === end) return;
                const selectedText = textarea.value.slice(start, end);
                e.preventDefault();
                e.clipboardData.setData('text/plain', textToClipboardText(selectedText));
            });
        }
    </script>
</body>

</html>
