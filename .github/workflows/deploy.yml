name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - run: pnpm i

      - run: node --run test

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - run: deno run test:deno

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun test:bun

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - run: |
      #     rm -f website/base128.js
      #     cp main.js website/base128.js

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
