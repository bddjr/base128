name: test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - run: pnpm i

      - run: npm test
