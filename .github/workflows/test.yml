name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - run: pnpm i

      - run: node --run test

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - run: deno run test:deno

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun test:bun
